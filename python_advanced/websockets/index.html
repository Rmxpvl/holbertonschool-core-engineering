<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="chat">
        <header class="chat__header">
            <h1>WebSocket Chat</h1>
            <span id="status" class="status status--connecting">Connecting…</span>
        </header>

        <ul id="messages" class="chat__messages"></ul>

        <form id="chat-form" class="chat__form">
            <input id="username" type="text" placeholder="Your name" maxlength="24" autocomplete="off">
            <input id="message" type="text" placeholder="Type a message…" autocomplete="off" required>
            <button id="send-btn" type="submit">Send</button>
        </form>
    </div>

    <script src="/chat.js"></script>
</body>
</html>
